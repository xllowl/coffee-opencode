<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover 适配 iPhone 刘海屏安全区 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3e2f25">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>咖啡手账</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <!-- 霞鹜文楷 Web 字体（中文手账风格） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- 深咖啡色顶栏 -->
  <header class="topbar"><h1>咖啡手账</h1></header>

  <!-- SPA 视图容器：所有页面由 js/views.js 渲染进这里 -->
  <main id="view"><div class="page-loading">加载中…</div></main>

  <!-- 底部 Tab：时间线 | 豆库 | ＋（居中放大） | 统计 | 设置 -->
  <nav class="tabbar">
    <a href="#/" data-tab="timeline"><span class="tab-ico">📖</span>时间线</a>
    <a href="#/library" data-tab="library"><span class="tab-ico">🫘</span>豆库</a>
    <a href="#/entry/new" data-tab="add" class="tab-add"><span>＋</span></a>
    <a href="#/stats" data-tab="stats"><span class="tab-ico">📊</span>统计</a>
    <a href="#/settings" data-tab="settings"><span class="tab-ico">⚙️</span>设置</a>
  </nav>

  <div id="toast"></div>

  <!-- 仅允许的第三方 CDN 库 -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="./js/store.js"></script>
  <script src="./js/image.js"></script>
  <script src="./js/llm.js"></script>
  <script src="./js/views.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
