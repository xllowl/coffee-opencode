<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover 适配 iPhone 刘海屏安全区 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3e2f25">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>咖啡手账</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <!-- 霞鹜文楷 Web 字体（中文手账风格） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
  <!-- FontAwesome 6 免费版（solid/regular，CDN 加载；失败时置标记由 js/icons.js 降级） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
        onerror="window.__faFailed=true">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- 深咖啡色顶栏（右侧地球入口直达产地地图） -->
  <header class="topbar">
    <h1>咖啡手账</h1>
    <a class="topbar-map" href="#/map" aria-label="世界产地地图"><i class="fa-solid fa-earth-americas" data-emo="🌍"></i></a>
  </header>

  <!-- SPA 视图容器：所有页面由 js/views.js 渲染进这里 -->
  <main id="view"><div class="page-loading">加载中…</div></main>

  <!-- 底部 Tab：时间线 | 豆库 | ＋（居中放大） | 统计 | 设置 -->
  <nav class="tabbar">
    <a href="#/" data-tab="timeline"><i class="fa-solid fa-book-open" data-emo="📖"></i>时间线</a>
    <a href="#/library" data-tab="library"><i class="fa-solid fa-seedling" data-emo="🫘"></i>豆库</a>
    <a href="#/entry/new" data-tab="add" class="tab-add"><span><i class="fa-solid fa-plus" data-emo="＋"></i></span></a>
    <a href="#/stats" data-tab="stats"><i class="fa-solid fa-chart-simple" data-emo="📊"></i>统计</a>
    <a href="#/settings" data-tab="settings"><i class="fa-solid fa-gear" data-emo="⚙️"></i>设置</a>
  </nav>

  <div id="toast"></div>

  <!-- 仅允许的第三方 CDN 库 -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- 二维码生成（探店分享卡片用；MIT 开源，加载失败时分享卡片自动省略二维码） -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/worldmap.js"></script>
  <script src="./js/flavors.js"></script>
  <script src="./js/icons.js"></script>
  <script src="./js/image.js"></script>
  <script src="./js/llm.js"></script>
  <script src="./js/views.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
